services:
  db:
    image: pgvector/pgvector:pg16   # postgres:16 + pgvector extension
    environment:
      POSTGRES_USER: kb
      POSTGRES_PASSWORD: kb
      POSTGRES_DB: kb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kb -d kb"]
      interval: 3s
      timeout: 3s
      retries: 10

  bot:
    build: .
    # This compose file does not start bundled embeddings. In Docker use either:
    #   EMBED_MODE=disabled
    #   EMBED_MODE=external with EMBED_BASE_URL=http://host.docker.internal:8300/v1
    command: sh -c "python -m scripts.preflight runtime && python -m scripts.preflight config --docker && python -m src.bot"
    env_file: .env
    # Override the .env DATABASE_URL: inside the compose network the DB host is
    # "db", not "localhost". .env keeps localhost so a locally-run bot works too.
    environment:
      DATABASE_URL: postgresql://kb:kb@db:5432/kb
      # Local .env URLs use localhost for a host-run bot. Container must reach
      # those same services through Docker's host gateway.
      OPENAI_BASE_URL: ${DOCKER_OPENAI_BASE_URL:-http://host.docker.internal:20128/v1}
      EMBED_MODE: ${DOCKER_EMBED_MODE:-external}
      EMBED_BASE_URL: ${DOCKER_EMBED_BASE_URL:-http://host.docker.internal:8300/v1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure:5

volumes:
  pgdata:
